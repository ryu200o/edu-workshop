spring.application.name=edu-workshop

# Test datasource: embedded H2 in PostgreSQL-compatibility mode (fast, no Docker).
spring.datasource.url=jdbc:h2:mem:edu-workshop;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway owns the schema 100%; Hibernate must not touch DDL (avoids H2<->Hibernate validate friction).
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# Do not attempt to start docker-compose during tests.
spring.docker.compose.enabled=false
